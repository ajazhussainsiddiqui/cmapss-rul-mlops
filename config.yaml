data:
  raw_path: "data/raw/CMAPSSData/"
  processed_path: "data/processed/CMAPSSData/"
  dataset: "FD001"
  # all_datasets_id: ["FD001", "FD002", "FD003", "FD004"]
  col_names:
    - engine_id
    - cycle
    - op_setting_1
    - op_setting_2
    - op_setting_3
    - s1
    - s2
    - s3
    - s4
    - s5
    - s6
    - s7
    - s8
    - s9
    - s10
    - s11
    - s12
    - s13
    - s14
    - s15
    - s16
    - s17
    - s18
    - s19
    - s20
    - s21
  # constant_cols : ['op_setting_3', 's1', 's5', 's10', 's16', 's18', 's19']
  non_sensor_cols: ["engine_id", "cycle", "op_setting_1", "op_setting_2", "op_setting_3", "dataset", "RUL", "will_fail_soon"]


feature_engineering:
  rul_clip: 125
  rolling_windows: [5, 10, 30]
  lag_steps: [1, 3, 5]


training:
  test_size: 0.2
  cv_folds: 5
  n_trials: 50
  n_jobs: 1
  early_failure_threshold: 30   # for binary classification head
  non_feature_columns: ["engine_id", "RUL", "will_fail_soon"] 
  
  

mlflow:
  experiment_name: "turbofan_rul_prediction"
  tracking_uri: "sqlite:///mlflow.db"
  artifact: "artifacts"


api:
  host: "0.0.0.0"
  port: 8000